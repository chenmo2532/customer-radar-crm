services:
  - type: web
    name: customer-radar-crm
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    disk:
      name: crm-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /app/data
